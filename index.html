<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عيد ميلاد ضاضا 🎂</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-glow glow-1"></div>
<div class="bg-glow glow-2"></div>

<div class="hero-card">

    <span class="top-badge">🎉 Happy Birthday</span>

    <h1>
        كل سنة وانتي طيبة يا ضاضا ✨
    </h1>

    <p class="subtitle">
        وجودك في حياتي بيخلي كل حاجة ألطف وأحلى ❤️
    </p>

    <div class="countdown-box">
        <div id="countdown"></div>
    </div>

    <div class="buttons">
        <button onclick="playMusic()">تشغيل الموسيقى 🎵</button>
        <button class="secondary-btn" onclick="showMessage()">
            رسالة خاصة 💌
        </button>
    </div>

    <div class="message-card hidden" id="message">
        <p>
            مبسوط جدًا بوجودك معايا،
            وبتمنى أشوفك دايمًا سعيدة ومحققة كل اللي نفسك فيه ❤️
        </p>
    </div>

</div>

<section class="gallery-section">

    <h2>أجمل الذكريات 📸</h2>

    <div class="gallery">
        <img src="images/photo1.jpg" onclick="openImg(this)">
        <img src="images/photo2.jpg" onclick="openImg(this)">
        <img src="images/photo3.jpg" onclick="openImg(this)">
    </div>

</section>

<div class="popup" id="popup" onclick="closeImg()">
    <img id="popupImg">
</div>

<audio id="bgMusic" loop>
    <source src="music/music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
