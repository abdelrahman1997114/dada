<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عيد ميلاد ضاضا 🎂</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🎉 كل سنة وانتي طيبة يا ضاضا</h1>

<p>
يا رضوي،<br>
وجودك في حياتي فارق معايا جدًا ❤️
</p>

<div id="countdown"></div>

<div class="gallery">
    <img src="/images/photo1.jpg" onclick="openImg(this)">
    <img src="/images/photo2.jpg" onclick="openImg(this)">
    <img src="/images/photo3.jpg" onclick="openImg(this)">
</div>

<!-- زر تشغيل الموسيقى -->
<button onclick="playMusic()">تشغيل الموسيقى 🎵</button>

<button onclick="showMessage()">رسالة صغيرة</button>

<div class="hidden" id="message">
 مبسوط بوجودك معايا، و عقبال سنين كتير مع بعض فيها ❤️
</div>

</div>

<div class="popup" id="popup" onclick="closeImg()">
    <img id="popupImg">
</div>

<!-- عنصر الصوت -->
<audio id="bgMusic" loop>
    <source src="music/music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
